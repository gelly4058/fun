<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048</title>
  <link href="style/main.css" rel="stylesheet" type="text/css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, minimal-ui">
  <style>
    /* 1. Global Page Style */
    body { 
      background-color: #0b0b0b !important; 
      color: #eee !important;
      margin: 0; padding: 0;
    }
    .container { margin-top: 40px !important; width: 500px !important; }
    .title { color: #fff !important; }
    
    /* 2. THE FIX: The big square box behind the tiles */
    .game-container { 
      background: #151515 !important; /* Dark Gray box */
      border-radius: 6px;
      padding: 15px;
    }
    
    /* 3. Empty Cells (The "holes" where tiles go) */
    .grid-cell { 
      background: rgba(255, 255, 255, 0.05) !important; 
      border-radius: 3px;
    }

    /* 4. Score and Buttons */
    .restart-button, .keep-playing-button, .retry-button {
      background: #eee !important;
      color: #111 !important;
      border-radius: 4px;
      padding: 10px 20px;
    }
    .score-container, .best-container {
      background: #151515 !important;
      color: #fff !important;
    }

    .game-intro, .game-explanation { color: #888 !important; }
    
    /* Force hide the junk footer and ads */
    hr, .game-explanation ~ p, .game-explanation ~ hr { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <div class="heading">
      <h1 class="title">2048</h1>
      <div class="scores-container">
        <div class="score-container">0</div>
        <div class="best-container">0</div>
      </div>
    </div>

    <div class="above-game">
      <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
      <a class="restart-button">New Game</a>
    </div>

    <div class="game-container">
      <div class="game-message">
        <p></p>
        <div class="lower">
	        <a class="keep-playing-button">Keep going</a>
          <a class="retry-button">Try again</a>
        </div>
      </div>

      <div class="grid-container">
        <div class="grid-row">
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
      </div>
      <div class="tile-container"></div>
    </div>

    <p class="game-explanation">
      <strong class="important">How to play:</strong> Use your <strong>arrow keys</strong> to move the tiles. When two tiles with the same number touch, they <strong>merge into one!</strong>
    </p>
  </div>

  <script src="js/bind_polyfill.js"></script>
  <script src="js/classlist_polyfill.js"></script>
  <script src="js/animframe_polyfill.js"></script>
  <script src="js/keyboard_input_manager.js"></script>
  <script src="js/html_actuator.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/tile.js"></script>
  <script src="js/local_storage_manager.js"></script>
  <script src="js/game_manager.js"></script>
  <script src="js/application.js"></script>
</body>
</html>
