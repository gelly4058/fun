<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>worlds hardest game</title>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This forces the ruffle player to be the boss of the screen */
        ruffle-player {
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            // "showAll" keeps the shape correct but makes it big. 
            // Change to "exactFit" if you want it to STRETCH to the corners.
            "scale": "showAll", 
            "autostart": true,
            "letterbox": "on"
        };

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("game-container");
        container.appendChild(player);
        player.load("worldshardestgame2.swf");
    </script>

</body>
</html>
