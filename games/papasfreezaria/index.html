<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Papa's Freezeria</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; display: flex; flex-direction: column; overflow: hidden; }
        #flash-container { flex-grow: 1; width: 100vw; height: 100vh; display: block; }
        ruffle-player { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="flash-container"></div>
    <!-- Loads the Ruffle emulator from a reliable CDN -->
    <script src="https://unpkg.com"></script>
    <script>
        // Blocks the game from opening new tabs/scams
        window.open = function() { return null; };
        
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("flash-container").appendChild(player);
            
            player.load({
                url: "papasfreezeria.swf", // MAKE SURE THIS MATCHES YOUR FILE NAME EXACTLY
                letterbox: "on",
                scale: "showAll",
                autoplay: "on",
                allowScriptAccess: false 
            });
        });
    </script>
</body>
</html>
