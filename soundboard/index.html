<!DOCTYPE html>
<html>
<head>
    <title> </title>
    <style>
        /* Matches your Dashboard #111 / #1a1a1a Theme */
        body { 
            background-color: #111; 
            color: #d3d3d3; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }

        h1 { font-size: 32px; letter-spacing: -1px; color: #fff; margin-bottom: 30px; }

        /* Sound Buttons Grid */
        #soundboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Button Style matching your Gelly theme */
        .sound-btn {
            background: #1a1a1a;
            color: #aaa;
            border: 1px solid #333;
            padding: 20px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sound-btn:hover {
            background: #d3d3d3;
            color: #111;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Control Bar at Top */
        .controls {
            margin-bottom: 30px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid #333;
        }

        .ctrl-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .ctrl-btn:hover { background: #444; }
    </style>
</head>
<body>

    <h1>sound engine</h1>

    <div class="controls">
        <button class="ctrl-btn" onclick="stopAll()">Stop Everything</button>
    </div>

    <div id="soundboard-container">
        <!-- The loader.js will fill this with buttons automatically -->
    </div>

    <script src="loader.js"></script>
    <script>
        function stopAll() {
            const audios = document.querySelectorAll('audio');
            audios.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }
    </script>
</body>
</html>
