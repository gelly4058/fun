<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --sidebar: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --sidebar: #f5f5f5;
            --card: #eeeeee;
            --accent: #000000;
            --secondary: #e0e0e0;
            --text: #111111;
            --subtext: #666666;
        }

        * { box-sizing: border-box; text-transform: lowercase; }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: background-color 0.3s ease;
            cursor: default;
        }

        button, .nav-item, .game-card, .game-card *, select, .save-btn, .btn-action, .transfer-btn, .fav-btn, .filter-fav-btn {
            cursor: pointer !important;
        }

        #landing {
            height: 100vh; width: 100vw;
            display: flex; background: #0b0b0b;
            position: fixed; top: 0; left: 0;
            z-index: 9999;
        }

        .transfer-lock {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 180px;
        }

        #transfer-code {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 44px;
            z-index: 5;
            background: var(--secondary);
            border: none;
            border-radius: 12px;
            color: var(--text);
            padding: 0 14px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            font-family: inherit;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #unlock-btn {
            position: absolute;
            top: 54px;
            left: 0;
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: var(--secondary);
            color: var(--subtext);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            z-index: 5;
        }

        #unlock-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .transfer-btn {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 44px;
            padding: 12px 18px;
            background: transparent;
            border: none;
            color: var(--subtext);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            font-family: inherit;
            z-index: 1;
        }
        
        .transfer-btn:hover {
            background: var(--secondary);
            color: var(--accent);
        }

        .transfer-unlocked #transfer-code,
        .transfer-unlocked #unlock-btn {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
        }

        #main-ui { display: none; height: 100vh; width: 100vw; overflow: hidden; opacity: 0; transition: opacity 0.5s ease; }

        #sidebar {
            width: 260px; min-width: 260px;
            background: var(--sidebar); border-right: 1px solid var(--secondary);
            display: flex; flex-direction: column;
            padding: 30px 20px; transition: var(--transition);
            z-index: 10;
        }

        .sidebar-hidden #sidebar { margin-left: -260px; opacity: 0; }

        .brand { font-size: 24px; font-weight: 900; margin-bottom: 50px; padding-left: 10px; letter-spacing: -1px; color: var(--accent); }
        .nav-items { flex: 1; }
        .nav-item {
            padding: 12px 18px; margin-bottom: 8px; border-radius: 12px;
            color: var(--subtext); background: none; border: none;
            transition: var(--transition); font-weight: 600; text-align: left;
            font-size: 14px; display: block; width: 100%;
            font-family: inherit;
        }
        .nav-item:hover, .nav-item.active { background: var(--secondary); color: var(--accent); }
        
        .sidebar-footer { padding: 10px; font-size: 11px; color: #222; font-weight: 600; letter-spacing: 1px; }

        .viewport { flex: 1; height: 100vh; overflow-y: auto; position: relative; transition: var(--transition); }
        .section { display: none; animation: fadeIn 0.5s ease; height: 100%; position: relative; }
        .section.active { display: block; }
        
        #home, #settings { padding: 60px 80px; }
        #home h1, #settings h1 { font-size: 56px; font-weight: 900; margin-bottom: 35px; letter-spacing: -2px; }

        #games { padding: 40px; }
        .counter-label { font-size: 12px; color: var(--subtext); font-weight: 600; margin-bottom: 15px; padding-left: 5px; display: block; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 50px; align-items: center; }
        input, select, .filter-fav-btn { 
            background: var(--secondary); border: none; color: var(--text); 
            padding: 12px 20px; border-radius: 12px; outline: none; 
            font-family: inherit; height: 45px;
        }
        #search { flex: 1; }

        .filter-fav-btn { display: flex; align-items: center; justify-content: center; min-width: 45px; transition: var(--transition); }
        .filter-fav-btn.active { background: var(--accent); color: var(--bg); }
        .filter-fav-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .filter-fav-btn.active svg { fill: currentColor; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        
        .game-card { background: var(--card); border-radius: 18px; padding: 10px; transition: var(--transition); text-align: center; position: relative; }
        .game-card:hover { transform: scale(1.03); background: var(--secondary); }
        .game-card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; margin-bottom: 8px; object-fit: cover; }
        
        .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 0 4px; }
        .game-card span { font-size: 12px; color: var(--subtext); font-weight: 600; text-align: left; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .fav-btn { background: none; border: none; padding: 5px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; }
        .fav-btn:hover { transform: scale(1.2); }
        .fav-icon { width: 16px; height: 16px; fill: none; stroke: var(--subtext); stroke-width: 2.5; transition: var(--transition); }
        .fav-btn.active .fav-icon { fill: var(--accent); stroke: var(--accent); }

        #player { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 20; opacity: 0; transition: opacity 0.5s var(--transition); }
        #player.active { display: block; opacity: 1; }
        .top-bar { height: 70px; display: flex; align-items: center; padding: 0 20px; background: var(--sidebar); border-bottom: 1px solid var(--secondary); }
        
        .top-right { margin-left: auto; display: flex; gap: 10px; }

        .btn-action { 
            padding: 10px 18px; border-radius: 12px; background: none; border: none;
            color: var(--subtext); font-weight: 600; transition: var(--transition); 
            font-family: inherit; font-size: 14px;
        }
        .btn-action:hover { background: var(--secondary); color: var(--accent); }
        .btn-panic { color: var(--panic); }
        .btn-panic:hover { background: var(--panic); color: white; }

        .settings-group { max-width: 500px; margin-bottom: 30px; display: flex; flex-direction: column; }
        .settings-label { color: var(--subtext); font-size: 12px; font-weight: 600; margin-bottom: 12px; padding-left: 5px; }
        #settings-controls { position: absolute; bottom: 60px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: center; }
        #save-status { color: var(--subtext); font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s ease; }
        #save-status.visible { opacity: 1; }
        .save-btn { background: var(--secondary); color: var(--text); border: none; border-radius: 12px; padding: 12px 25px; font-weight: 600; transition: var(--transition); font-family: inherit; }
        .save-btn:hover { background: var(--accent); color: var(--bg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="landing">
        <div class="transfer-lock">
            <input type="password" id="transfer-code" placeholder="enter code..." autocomplete="off">
            <button id="unlock-btn">enter</button>
            <button class="transfer-btn" onclick="transfer()">transfer</button>
        </div>
    </div>

    <div id="main-ui">
        <!-- your existing main-ui stays exactly the same -->
    </div>

    <script>
        function unlockTransfer() {
            const code = document.getElementById('transfer-code').value;

            if (code === 'gg55') {
                document.querySelector('.transfer-lock').classList.add('transfer-unlocked');
            } else {
                document.body.innerHTML = '';
                document.body.style.background = getComputedStyle(document.documentElement)
                    .getPropertyValue('--bg');
                document.title = 'about:blank';
            }
        }

        document.getElementById('unlock-btn').addEventListener('click', unlockTransfer);

        document.getElementById('transfer-code').addEventListener('keydown', e => {
            if (e.key === 'Enter') unlockTransfer();
        });

        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" }
        ];

        let favorites = JSON.parse(localStorage.getItem('gelly-favs')) || [];
        let currentSort = localStorage.getItem('gelly-sort') || 'az';
        let favFilterActive = localStorage.getItem('gelly-fav-filter') === 'true';
        let hasUnsavedChanges = false;

        function init() {
            const panicUrl = localStorage.getItem('gelly-panic') || 'https://google.com';
            const theme = localStorage.getItem('gelly-theme') || 'dark';
            
            document.documentElement.setAttribute('data-theme', theme);
        }

        function transfer() {
            const win = window.open();
            if (!win) return alert("allow popups");
            win.document.body.style.margin = '0';
            win.document.body.style.background = '#0b0b0b';
            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100vh;";
            ifr.src = window.location.href + "#cloaked";
            win.document.body.appendChild(ifr);
            window.close();
        }

        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            setTimeout(() => { document.getElementById('main-ui').style.opacity = '1'; }, 50);
        }

        init();
    </script>
</body>
</html>
