<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --sidebar: #0a0a0a;
            --card: #111111;
            --accent: #00ff88; /* swapped purple for mint green */
            --secondary: #1a1a1a;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            cursor: default;
            text-transform: lowercase;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        /* --- Landing --- */
        #landing {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            position: fixed;
            z-index: 9999;
        }

        .transfer-btn {
            padding: 15px 40px;
            background: none;
            border: 1px solid var(--secondary);
            color: var(--text);
            border-radius: 100px;
            font-size: 14px;
            transition: var(--transition);
            cursor: pointer;
        }

        .transfer-btn:hover {
            background: var(--text);
            color: var(--bg);
            transform: scale(1.05);
        }

        /* --- Layout --- */
        #main-ui {
            display: none;
            height: 100vh;
            width: 100vw;
            display: flex;
        }

        #sidebar {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid var(--secondary);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 50px;
            padding-left: 10px;
            letter-spacing: -1px;
            color: var(--accent);
        }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--subtext);
            transition: var(--transition);
            font-weight: 600;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--secondary);
            color: var(--accent);
        }

        .viewport {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .section { display: none; animation: fadeIn 0.5s ease; }
        .section.active { display: block; }

        /* --- Games --- */
        .controls { display: flex; gap: 15px; margin-bottom: 40px; }
        input, select {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
        }
        input { flex: 1; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 10px;
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
        }

        .game-card:hover { transform: scale(1.05); background: var(--secondary); }
        .game-card img { width: 100%; aspect-ratio: 1/1; border-radius: 15px; margin-bottom: 10px; object-fit: cover; }
        .game-card span { font-size: 13px; color: var(--subtext); font-weight: 600; }

        /* --- Player --- */
        #player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 10000;
        }

        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            background: var(--sidebar);
        }

        .top-right { margin-left: auto; display: flex; gap: 15px; }

        .btn {
            background: var(--secondary);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-panic { color: var(--panic); }

        iframe { width: 100%; height: calc(100% - 60px); border: none; }

        /* --- Update Marker --- */
        #version-tag {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 12px;
            color: #222;
            pointer-events: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="transfer-btn" onclick="transfer()">transfer</button>
    </div>

    <div id="main-ui" class="hidden">
        <div id="sidebar">
            <div class="brand">gelly</div>
            <div class="nav-item active" onclick="tab('home', this)">home</div>
            <div class="nav-item" onclick="tab('games', this)">games</div>
            <div class="nav-item" onclick="tab('sounds', this)">soundboard</div>
        </div>

        <div class="viewport">
            <div id="home" class="section active">
                <h1 style="font-size: 48px; font-weight: 900;">gelly</h1>
                <p style="color: var(--subtext); max-width: 400px; line-height: 1.6;">
                    a minimalist, high-speed arcade hub. strictly dark mode. strictly smooth.
                </p>
            </div>

            <div id="games" class="section">
                <div class="controls">
                    <input type="text" id="search" placeholder="search..." oninput="draw()">
                    <select id="sort" onchange="draw()">
                        <option value="az">a-z</option>
                        <option value="za">z-a</option>
                    </select>
                </div>
                <div class="grid" id="game-grid"></div>
            </div>

            <div id="sounds" class="section">
                <iframe src="soundboard/index.html" style="height: 80vh; border-radius: 24px;"></iframe>
            </div>
        </div>
    </div>

    <div id="player">
        <div class="top-bar">
            <button class="btn" onclick="closeGame()">back</button>
            <div class="top-right">
                <button class="btn" onclick="toggleFS()">fullscreen</button>
                <button class="btn btn-panic" onclick="panic()">panic</button>
            </div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <div id="version-tag">a</div>

    <script>
        const gameData = [
            { name: "2048", id: "2048", img: "2048icon.png" },
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" },
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" },
            { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" },
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" },
            { name: "doodle jump", id: "doodlejump", img: "doodlejumpicon.png" },
            { name: "drive mad", id: "drivemad", img: "drivemadicon.png" },
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" },
            { name: "flappy bird", id: "flappy", img: "flappybirdicon.png" },
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" },
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" },
            { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" },
            { name: "red ball", id: "redball", img: "redballicon.png" },
            { name: "run 3", id: "run3", img: "run3icon.png" },
            { name: "slope", id: "slope", img: "slopeicon.png" },
            { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" },
            { name: "tetris", id: "tetris", img: "tetrisicon.png" },
            { name: "vex 4", id: "vex4", img: "vex4icon.png" }
        ];

        function transfer() {
            const win = window.open();
            if (!win) return alert("allow popups");

            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            win.document.body.style.background = '#050505';

            const ifr = win.document.createElement('iframe');
            ifr.style = "border:none; width:100%; height:100%;";
            // We pass a hash so the new window knows to skip the landing page
            ifr.src = window.location.href + "#cloaked";
            
            win.document.body.appendChild(ifr);
            window.location.replace("https://classroom.google.com");
        }

        // Check if we are cloaked (via iframe or hash)
        if (window.self !== window.top || window.location.hash === "#cloaked") {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            document.getElementById('main-ui').style.display = 'flex';
        }

        function tab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function draw() {
            const grid = document.getElementById('game-grid');
            const term = document.getElementById('search').value.toLowerCase();
            const sort = document.getElementById('sort').value;

            let list = gameData.filter(g => g.name.includes(term));
            list.sort((a, b) => sort === 'az' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));

            grid.innerHTML = '';
            list.forEach(g => {
                const div = document.createElement('div');
                div.className = 'game-card';
                div.onclick = () => {
                    document.getElementById('player').style.display = 'block';
                    document.getElementById('game-frame').src = `games/${g.id}/index.html`;
                };
                div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`;
                grid.appendChild(div);
            });
        }

        function closeGame() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function panic() { window.location.href = "https://classroom.google.com"; }
        function toggleFS() {
            let f = document.getElementById('game-frame');
            if (f.requestFullscreen) f.requestFullscreen();
            else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
        }

        draw();
    </script>
</body>
</html>
