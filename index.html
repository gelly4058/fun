<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --nav: #080808; --card: #141414; --accent: #ffffff; --secondary: #1e1e1e; --text: #eeeeee; --subtext: #777777; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; width: 100%; overflow: hidden; }
        
        /* Navbars */
        #navbar, .player-bar { height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; width: 100%; z-index: 100; transition: var(--transition); }
        #navbar { position: fixed; top: 0; }
        #navbar.hidden, .player-bar.hidden { transform: translateY(-70px); opacity: 0; pointer-events: none; position: absolute; }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        /* Viewport */
        .viewport { padding-top: 70px; height: 100vh; width: 100%; overflow-y: scroll; overflow-x: hidden; scroll-behavior: smooth; transition: padding 0.5s var(--transition); }
        .viewport.fullscreen-mode { padding-top: 0; }
        .viewport.no-scroll { overflow-y: hidden; }

        .section { display: none; padding: 100px 60px 60px 60px; animation: fadeIn 0.4s ease forwards; min-height: calc(100vh - 70px); position: relative; }
        .section.active { display: block; }
        
        #proxy.section, #sounds.section { padding: 0; height: calc(100vh - 70px); overflow: hidden; }

        #proxy-frame, #soundboard-frame { width: 100%; height: 100%; border: none; display: block; background: transparent; }

        /* UI Elements */
        .page-header { text-align: center; margin-bottom: 60px; width: 100%; }
        .page-header h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; color: var(--accent); }
        .page-header p { color: var(--subtext); margin-top: 12px; font-weight: 600; font-size: 16px; opacity: 0.8; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; }
        .game-card { background: var(--card); border-radius: 18px; padding: 12px; text-align: center; transition: var(--transition); cursor: pointer; border: 1px solid transparent; }
        .game-card:hover { transform: translateY(-5px); background: var(--secondary); border-color: #333; }
        .game-card img { width: 100%; border-radius: 12px; aspect-ratio: 1; object-fit: cover; margin-bottom: 12px; }
        .game-card span { font-size: 14px; font-weight: 600; color: var(--subtext); transition: var(--transition); display: block; }
        .game-card:hover span { color: var(--accent); }

        #save-status { position: absolute; bottom: 45px; left: 60px; font-size: 13px; font-weight: 600; color: var(--subtext); opacity: 0; transition: opacity 0.3s ease; }
        #save-status.visible { opacity: 1; }
        .save-btn-container { position: absolute; bottom: 40px; right: 60px; }

        /* Game Player */
        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; opacity: 0; pointer-events: none; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.5s var(--transition); }
        #player.active { opacity: 1; pointer-events: all; transform: scale(1); }
        #player-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; font-size: 16px; color: var(--subtext); }
        #game-frame { position: relative; width: 100%; height: calc(100vh - 70px); border: none; z-index: 2; background: transparent; transition: height 0.5s var(--transition); }

        /* Landing/Secret */
        #landing { height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px; background: #0b0b0b; position: fixed; z-index: 9999; pointer-events: all; }
        #secret-container { display: flex; align-items: center; position: absolute; top: 20px; left: 20px; opacity: 1; transition: opacity 0.4s ease; }
        #secret-input { background: transparent; border: none; color: var(--subtext); opacity: 0.3; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 0; width: 80px; text-transform: lowercase; user-select: text; -webkit-text-security: disc; letter-spacing: -1px; }
        #check-btn { background: none; border: none; color: var(--subtext); opacity: 0.3; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        #check-btn:hover { opacity: 1; color: var(--accent); }
        #check-btn svg { width: 18px; height: 18px; fill: currentColor; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="landing">
        <div id="secret-container">
            <button id="check-btn" onclick="checkCode()"><svg viewBox="0 0 24 24"><path d="M21,7L9,19L3.5,13.5L4.91,12.09L9,16.17L19.59,5.59L21,7Z"/></svg></button>
            <input type="text" id="secret-input" autocomplete="off">
        </div>
    </div>

    <div id="navbar">
        <div class="nav-left">
            <button class="nav-btn active" onclick="tab('home', this)">home</button>
            <button class="nav-btn" onclick="tab('games', this)">games</button>
            <button class="nav-btn" onclick="tab('proxy', this)">proxy</button>
            <button class="nav-btn" onclick="tab('sounds', this)">soundboard</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
            <button class="icon-btn" onclick="toggleFS()" title="fullscreen">
                <svg viewBox="0 0 24 24"><path d="M7,14H5V19H10V17H7V14M5,10H7V7H10V5H5V10M17,17H14V19H19V14H17V17M14,5V7H17V10H19V5H14Z"/></svg>
            </button>
            <button class="icon-btn" onclick="tab('settings', this)" title="settings">
                <svg viewBox="0 0 24 24"><path d="M19.43,12.98C19.47,12.66 19.5,12.34 19.5,12C19.5,11.66 19.47,11.34 19.43,11.02L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.65 15.48,5.32 14.87,5.07L14.49,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.51,2.42L9.13,5.07C8.52,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.02C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.66 4.57,12.98L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.35 8.52,18.68 9.13,18.93L9.51,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.49,21.58L14.87,18.93C15.48,18.68 16.04,18.35 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.98M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5Z"/></svg>
            </button>
        </div>
    </div>

    <div class="viewport" id="main-viewport">
        <div id="home" class="section active"><div class="page-header"><h1>gelly v2.4.3</h1><p>if you dont like fries then LEAVE now...</p></div></div>
        <div id="games" class="section"><div class="page-header"><h1>gelly games</h1><p>click on a game to play</p></div><div id="game-grid" class="grid"></div></div>
        <div id="proxy" class="section"><iframe id="proxy-frame" sandbox="allow-forms allow-scripts allow-same-origin allow-popups-to-escape-sandbox"></iframe></div>
        <div id="sounds" class="section"><iframe id="soundboard-frame" src="soundboard/index.html"></iframe></div>
        <div id="settings" class="section">
            <div class="page-header"><h1>gelly settings</h1><p>configure your experience</p></div>
            
            <p style="color: var(--subtext); font-weight: 600;">panic url</p>
            <input type="text" id="panic-input" oninput="markUnsaved()" placeholder="https://classroom.google.com" style="padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-family: inherit; width: 350px;">
            
            <p style="color: var(--subtext); font-weight: 600; margin-top: 20px;">panic keybind (click & press key)</p>
            <input type="text" id="panic-key-input" placeholder="`" style="padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-family: inherit; width: 350px; cursor: pointer;" readonly>
            
            <span id="save-status">press save changes to save these</span>
            <div class="save-btn-container"><button class="nav-btn active" onclick="saveSettings()">save changes</button></div>
        </div>
    </div>

    <div id="player">
        <div id="player-bar" class="player-bar">
            <button class="icon-btn" onclick="closeGame()"><svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg></button>
            <div id="player-title"></div>
            <div class="nav-right">
                <button class="icon-btn" onclick="panic()"><svg viewBox="0 0 24 24"><path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/></svg></button>
                <button class="icon-btn" onclick="toggleFS()"><svg viewBox="0 0 24 24"><path d="M7,14H5V19H10V17H7V14M5,10H7V7H10V5H5V10M17,17H14V19H19V14H17V17M14,5V7H17V10H19V5H14Z"/></svg></button>
            </div>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        let hasUnsavedChanges = false;
        
        const gameData = [ 
            { name: "2048", id: "2048", img: "2048icon.png" }, 
            { name: "bitlife", id: "bitlife", img: "bitlifeicon.png" }, 
            { name: "cookie clicker", id: "cookieclicker", img: "cookieclickericon.png" }, 
            { name: "crossy road", id: "crossyroad", img: "crossyroadicon.png" }, 
            { name: "dino game", id: "dinogame", img: "dinogameicon.png" }, 
            { name: "drive mad", id: "drivemad", img: "drivemadicon.png" }, 
            { name: "duck life", id: "ducklife", img: "ducklifeicon.png" }, 
            { name: "flappy bird", id: "flappybird", img: "flappybirdicon.png" }, 
            { name: "geometry dash", id: "geodash", img: "geodashicon.png" }, 
            { name: "getting over it", id: "gettingoverit", img: "gettingoveriticon.png" }, 
            { name: "minecraft", id: "minecraft", img: "minecrafticon.png" }, 
            { name: "paper.io 2", id: "paperio2", img: "paperio2icon.png" }, 
            { name: "red ball", id: "redball", img: "redballicon.png" }, 
            { name: "run 3", id: "run3", img: "run3icon.png" }, 
            { name: "slope", id: "slope", img: "slopeicon.png" }, 
            { name: "stickman hook", id: "stickmanhook", img: "stickmanhookicon.png" }, 
            { name: "tetris", id: "tetris", img: "tetrisicon.png" }, 
            { name: "tiny fishing", id: "tinyfishing", img: "tinyfishingicon.png" }, 
            { name: "vex 4", id: "vex4", img: "vex4icon.png" }, 
            { name: "moto x3m", id: "motox3m", img: "motox3micon.png" }, 
            { name: "drift hunters", id: "drifthunters", img: "drifthuntersicon.png" }, 
            { name: "suika game", id: "suikagame", img: "suikagameicon.png" }, 
            { name: "worlds hardest game", id: "worldshardestgame", img: "worldshardestgameicon.png" }, 
            { name: "survival race", id: "survivalrace", img: "survivalraceicon.png" }, 
            { name: "the impossible quiz", id: "theimpossiblequiz", img: "theimpossiblequizicon.png" },
            { name: "flappy dunk", id: "flappydunk", img: "flappydunkicon.png" }
        ];
        
        function checkCode() { 
            const input = document.getElementById('secret-input'); 
            if (input.value === "gg55") { 
                transfer(); 
            } else { 
                input.value = ""; 
                input.blur(); 
            } 
        }
        document.getElementById('secret-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkCode(); });
        
        function transfer() {
            const url = window.location.href;
            const newWindow = window.open('about:blank', '_blank');
            if (newWindow) {
                newWindow.document.body.style.margin = '0';
                newWindow.document.body.style.height = '100vh';
                newWindow.document.body.style.backgroundColor = '#0b0b0b';
                
                const iframe = newWindow.document.createElement('iframe');
                iframe.style.border = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.margin = '0';
                iframe.src = url;
                
                newWindow.document.body.appendChild(iframe);
                
                iframe.onload = () => {
                    try {
                        const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const targetLanding = innerDoc.getElementById('landing');
                        if (targetLanding) {
                            targetLanding.style.display = 'none';
                        }
                    } catch (e) {
                        console.error("Bypass notice: If running locally without a web server, browser restrictions might require entering the code one more time inside the blank tab.", e);
                    }
                };

                setTimeout(() => {
                    // Redirects original tab to classroom.google.com instead of google.com
                    window.location.replace(localStorage.getItem('gelly-panic') || 'https://classroom.google.com');
                }, 300);
            }
        }

        function drawGames(query = "") { const grid = document.getElementById('game-grid'); grid.innerHTML = ''; gameData.filter(g => g.name.toLowerCase().includes(query.toLowerCase())).forEach(g => { const div = document.createElement('div'); div.className = 'game-card'; div.onclick = () => openGame(g.id, g.name); div.innerHTML = `<img src="icons/${g.img}"><span>${g.name}</span>`; grid.appendChild(div); }); }
        
        function openGame(id, name) { 
            document.getElementById('navbar').classList.add('hidden'); 
            document.getElementById('player').classList.add('active'); 
            document.getElementById('player-title').innerText = name; 
            
            const targetSrc = `games/${id}/index.html`;
            if (!document.getElementById('game-frame').src.includes(targetSrc)) {
                document.getElementById('game-frame').src = targetSrc; 
            }
        }
        
        function closeGame() { 
            if (document.fullscreenElement) document.exitFullscreen();
            document.getElementById('navbar').classList.remove('hidden'); 
            document.getElementById('player').classList.remove('active'); 
            document.getElementById('game-frame').src = ''; 
        }
        
        function tab(id, el) { 
            const vp = document.getElementById('main-viewport'); 
            const sbf = document.getElementById('soundboard-frame');
            
            if (['proxy', 'home', 'sounds'].includes(id)) vp.classList.add('no-scroll'); else vp.classList.remove('no-scroll'); 
            
            if (id !== 'sounds') {
                sbf.src = '';
                sbf.src = 'soundboard/index.html';
            }
            
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
            document.querySelectorAll('.nav-btn, .icon-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(el) el.classList.add('active'); 
        }

        function toggleFS() { 
            if (!document.fullscreenElement) document.documentElement.requestFullscreen(); 
            else document.exitFullscreen(); 
        }

        document.addEventListener('fullscreenchange', () => {
            const isFS = !!document.fullscreenElement;
            const player = document.getElementById('player');
            const playerBar = document.getElementById('player-bar');
            const mainNav = document.getElementById('navbar');
            const gameFrame = document.getElementById('game-frame');
            const viewport = document.getElementById('main-viewport');

            if (isFS) {
                if (player.classList.contains('active')) {
                    playerBar.classList.add('hidden');
                    gameFrame.style.height = '100vh';
                } else {
                    mainNav.classList.add('hidden');
                    viewport.classList.add('fullscreen-mode');
                }
            } else {
                if (player.classList.contains('active')) {
                    playerBar.classList.remove('hidden');
                    gameFrame.style.height = 'calc(100vh - 70px)';
                } else {
                    mainNav.classList.remove('hidden');
                    viewport.classList.remove('fullscreen-mode');
                }
            }
        });

        document.getElementById('panic-key-input').addEventListener('keydown', (e) => {
            e.preventDefault();
            document.getElementById('panic-key-input').value = e.key;
            markUnsaved();
        });

        document.addEventListener('keydown', (e) => {
            const panicKey = localStorage.getItem('gelly-panic-key') || '`';
            if (e.key === panicKey && document.activeElement.id !== 'panic-key-input' && document.activeElement.id !== 'secret-input') {
                panic();
            }
        });

        function markUnsaved() { hasUnsavedChanges = true; document.getElementById('save-status').innerText = "press save changes to save these"; document.getElementById('save-status').classList.add('visible'); }
        function saveSettings() { 
            localStorage.setItem('gelly-panic', document.getElementById('panic-input').value); 
            localStorage.setItem('gelly-panic-key', document.getElementById('panic-key-input').value); 
            hasUnsavedChanges = false; 
            document.getElementById('save-status').innerText = "saved changes"; 
            setTimeout(() => { if (!hasUnsavedChanges) document.getElementById('save-status').classList.remove('visible'); }, 2000); 
        }
        function revertSettings() { 
            document.getElementById('panic-input').value = localStorage.getItem('gelly-panic') || 'https://classroom.google.com'; 
            document.getElementById('panic-key-input').value = localStorage.getItem('gelly-panic-key') || '`'; 
        }
        function panic() { 
            const panicUrl = localStorage.getItem('gelly-panic') || 'https://classroom.google.com';
            window.top.location.href = panicUrl;
        }

        window.onload = () => {
            drawGames();
            revertSettings();
            if(!localStorage.getItem('gelly-panic')) {
                localStorage.setItem('gelly-panic', 'https://classroom.google.com');
            }
        };
    </script>
</body>
</html>
