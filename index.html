<!DOCTYPE html>
<html>
<head>
    <title>Google Drive</title> <!-- Fake title for tab -->
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .launch-btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>About Blank Cloak For Tabs</h1>
    <p>Click the button below to launch the unblocked game portal in a cloaked tab.</p>
    
    <!-- This is the button you press to go to the unblocked version -->
    <button class="launch-btn" onclick="launchCloaked()">Unblock Games</button>

    <script>
        function launchCloaked() {
            // 1. Open a new empty tab
            var win = window.open('about:blank', '_blank');
            
            // 2. This is the HTML that will appear inside the secret tab
            // You can add your search bar and game icons inside this 'content' variable
            var content = `
                <html>
                <head>
                    <title>Classes</title>
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
                        #search { width: 100%; padding: 15px; font-size: 18px; margin-bottom: 20px; border-radius: 5px; border: none; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
                        .game-card { background: #222; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
                        .game-card:hover { background: #333; transform: scale(1.05); }
                        .game-card img { width: 120px; height: 120px; border-radius: 8px; object-fit: cover; }
                    </style>
                </head>
                <body>
                    <input type="text" id="search" placeholder="Search for a game...">
                    <div class="grid">
                        <!-- GAME 1 -->
                        <div class="game-card" onclick="location.href='https://example.com'">
                            <img src="https://placeholder.com" alt="Game 1">
                            <p>Game Name 1</p>
                        </div>
                        <!-- Add more game-cards here -->
                    </div>
                </body>
                </html>
            `;

            // 3. Inject the content into the new about:blank tab
            win.document.write(content);
            win.document.close();
        }
    </script>
</body>
</html>
