<!DOCTYPE html>
<html>
<head>
    <title>Google Drive</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .launch-btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>About Blank Cloak For Tabs</h1>
    <button class="launch-btn" id="launcher">Unblock Games</button>

    <script>
        document.getElementById('launcher').onclick = function() {
            var win = window.open('about:blank', '_blank');
            var doc = win.document;

            // HTML content for the new tab
            var html = `
                <html>
                <head>
                    <title>Classes</title>
                    <style>
                        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
                        #search { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #222; color: white; margin-bottom: 20px; }
                        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
                        .game-card { background: #222; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
                        .game-card img { width: 120px; height: 120px; border-radius: 8px; }
                    </style>
                </head>
                <body>
                    <input type="text" id="search" placeholder="Search for a game...">
                    <div class="grid" id="gameGrid">
                        <div class="game-card" onclick="location.href='YOUR_GAME_URL'">
                            <img src="YOUR_IMAGE_URL" alt="Game Name">
                            <p>Game Name</p>
                        </div>
                    </div>
                </body>
                </html>
            `;
            doc.write(html);
            doc.close();
        };
    </script>
</body>
</html>
