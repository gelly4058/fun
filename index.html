<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gelly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0b;
            --nav: #080808;
            --card: #141414;
            --accent: #ffffff;
            --secondary: #1e1e1e;
            --text: #eeeeee;
            --subtext: #777777;
            --panic: #ff4444;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --nav: #f5f5f5;
            --card: #eeeeee;
            --accent: #000000;
            --secondary: #e0e0e0;
            --text: #111111;
            --subtext: #666666;
        }

        * { box-sizing: border-box; text-transform: lowercase; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        #navbar {
            height: 70px; background: var(--nav); border-bottom: 1px solid var(--secondary);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 100;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        #navbar.hidden { transform: translateY(-70px); opacity: 0; pointer-events: none; }

        .nav-left, .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 10px 18px; border-radius: 10px; color: var(--subtext); background: none; border: none; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit; }
        .nav-btn:hover, .nav-btn.active { color: var(--accent); background: var(--secondary); }
        
        .icon-btn { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; color: var(--subtext); cursor: pointer; transition: var(--transition); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover, .icon-btn.active { background: var(--secondary); color: var(--accent); }

        .viewport { padding-top: 70px; height: 100vh; overflow-y: auto; }
        .section { display: none; padding: 40px 60px; animation: fadeIn 0.4s ease forwards; min-height: calc(100vh - 70px); position: relative; }
        .section.active { display: block; }

        #sounds.section { padding: 0; height: calc(100vh - 70px); overflow: hidden; }
        #sound-frame { width: 100%; height: 100%; border: none; display: block; }

        .home-desc { color: var(--subtext); margin-top: 25px; font-weight: 600; font-size: 16px; line-height: 1.5; }

        .search-container { margin-bottom: 30px; width: 100%; max-width: 400px; }
        #game-search { width: 100%; padding: 12px 20px; background: var(--card); border: 1px solid var(--secondary); border-radius: 12px; color: var(--text); font-family: inherit; transition: var(--transition); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border-radius: 15px; padding: 10px; text-align: center; transition: var(--transition); cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); background: var(--secondary); }
        .game-card img { width: 100%; border-radius: 10px; aspect-ratio: 1; object-fit: cover; margin-bottom: 10px; }
        .game-card span { font-size: 13px; font-weight: 600; color: var(--subtext); transition: var(--transition); display: block; }
        .game-card:hover span { color: var(--accent); }

        #save-status { position: absolute; bottom: 45px; left: 60px; font-size: 13px; font-weight: 600; color: var(--subtext); opacity: 0; transition: opacity 0.3s ease; }
        #save-status.visible { opacity: 1; }
        .save-btn-container { position: absolute; bottom: 40px; right: 60px; }

        #player { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 200; opacity: 0; pointer-events: none; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #player.active { opacity: 1; pointer-events: all; transform: scale(1); }
        .player-bar { height: 70px; background: var(--nav); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--secondary); position: relative; }
        #player-title { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 600; font-size: 16px; color: var(--subtext); }
        
        .loader-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; color: var(--subtext); font-weight: 600; pointer-events: none; width: 100%; text-align: center; }
        #game-frame { position: relative; width: 100%; height: calc(100vh - 70px); border: none; z-index: 2; background: transparent; }

        #landing { height: 100vh; width: 100vw; display: flex; background: #0b0b0b; position: fixed; z-index: 9999; pointer-events: none; }
        #secret-btn { position: absolute; top: 20px; left: 20px; padding: 10px 18px; background: none; border: none; border-radius: 10px; color: var(--subtext); font-weight: 600; transition: var(--transition); font-family: inherit; visibility: hidden; pointer-events: none; }
        #secret-btn.active { visibility: visible !important; pointer-events: all !important; cursor: pointer !important; }
        #secret-btn.active:hover { color: var(--accent); background: var(--secondary); }
        #code-dots { position: fixed; bottom: 10px; left: 10px; display: flex; gap: 4px; }
        .dot { width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        </div>
    </div>

    <div class="viewport">
        <div id="home" class="section active">
            <h1 style="font-size: 50px; font-weight: 900; margin-bottom: 0;">gelly v2.0.5</h1>
            <p class="home-desc">welcome to uhhhh i forgot sorry</p>
        </div>

        <div id="games" class="section">
            <div class="search-container"><input type="text" id="game-search" placeholder="search games..." oninput="draw(this.value)"></div>
            <div class="grid" id="game-grid"></div>
        </div>

        <div id="sounds" class="section">
            <iframe id="sound-frame"></iframe>
        </div>

        <div id="settings" class="section">
            <p style="color: var(--subtext); font-weight: 600;">theme</p>
            <select id="theme-select" onchange="markUnsaved()" style="padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-family: inherit; width: 200px; cursor: pointer;"><option value="dark">dark</option><option value="light">light</option></select>
            <p style="color: var(--subtext); font-weight: 600; margin-top: 30px;">panic url</p>
            <input type="text" id="panic-input" oninput="markUnsaved()" placeholder="https://google.com" style="padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-family: inherit; width: 350px;">
            <span id="save-status">press save changes to save these</span>
            <div class="save-btn-container"><button class="nav-btn active" onclick="saveSettings()">save changes</button></div>
        </div>
    </div>

    <div id="player">

            <button class="icon-btn" onclick="closeGame()"><svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg></button>

            <div class="nav-right">

            </div>
        </div>
        <div class="loader-text"><p>this can take up to 2 minutes on your first launch.</p></div>
        <iframe id="game-frame"></iframe>
    </div>
